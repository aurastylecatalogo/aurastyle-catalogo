<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AURA Style — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;
  --bg2:#F5EEE6;
  --bg3:#EDE5DA;
  --brand:#4A2D1F;
  --brand2:#6b3f2c;
  --muted:#9a7a68;
  --text:#2a1a10;
  --footer:#3b1f13;
}
body{background:var(--bg);font-family:'Cormorant Garamond',serif;font-weight:400;color:var(--text);font-size:16px}

/* NAV */
nav{
  background:#fff;
  border-bottom:1px solid #e8e0d8;
  height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;
}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--brand);letter-spacing:1px;white-space:nowrap}
.nav-brand-spark{font-size:15px;color:var(--brand2);vertical-align:top}
.nav-brand em{font-style:italic;font-weight:400}
.nav-cats{display:flex;gap:6px;align-items:center}
.ncat{
  font-size:15px;color:var(--brand);background:var(--bg2);
  border:1px solid var(--bg3);border-radius:20px;
  padding:8px 20px;cursor:pointer;font-family:'Cormorant Garamond',serif;
  transition:.15s;white-space:nowrap;
}
.ncat:hover{border-color:var(--brand);color:var(--brand)}
.ncat.on{background:var(--brand);color:#fff;border-color:var(--brand)}

/* HEADER DE CATEGORÍA */
.catalog-header{max-width:1000px;margin:0 auto;padding:20px 20px 8px}
.breadcrumb{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.breadcrumb .crumb-link{cursor:pointer;transition:color .15s}
.breadcrumb .crumb-link:hover{color:var(--brand)}
.breadcrumb .crumb-current{color:var(--brand);font-weight:600}
.catalog-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--brand);letter-spacing:1px;text-transform:uppercase}

/* BANNER CARRUSEL */
.banner-wrap{position:relative;width:100%;max-width:1000px;margin:0 auto;overflow:hidden;background:var(--bg2)}
.banner-track{display:flex;transition:transform .5s ease}
.banner-slide{width:100%;flex:0 0 100%;aspect-ratio:2.5/1;overflow:hidden;position:relative}
.banner-slide img{width:100%;height:100%;object-fit:cover;display:block}
.banner-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px}
.banner-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.7);border:1.5px solid rgba(74,45,31,.8);cursor:pointer;flex-shrink:0}
.banner-dot.active{background:var(--brand)}
.banner-cta-bar{
  display:none;width:100%;max-width:1000px;margin:0 auto;
  background:var(--brand);color:#fff;border:none;cursor:pointer;
  padding:9px;font-size:13px;font-family:'Cormorant Garamond',serif;
  align-items:center;justify-content:center;gap:7px;letter-spacing:.5px;
  transition:background .15s;
}
.banner-cta-bar:hover{background:var(--brand2)}


.searchbar{background:var(--bg2);padding:14px 20px 4px;display:flex;justify-content:center}
.searchbar input{
  width:100%;max-width:560px;font-family:'Cormorant Garamond',serif;font-size:15px;
  color:var(--text);background:#fff;border:1px solid var(--bg3);border-radius:20px;
  padding:10px 18px;outline:none;transition:border-color .15s;
}
.searchbar input:focus{border-color:var(--brand)}
.searchbar input::placeholder{color:var(--muted)}

.sticky-top{position:sticky;top:0;z-index:50;background:#fff;box-shadow:0 2px 10px rgba(74,45,31,.06)}

/* MENÚ PRODUCTOS (dropdown) + BUSCADOR */
.menu-bar{
  background:#fff;display:flex;gap:18px;align-items:center;
  justify-content:center;padding:14px 20px;
  border-bottom:1px solid var(--bg3);
}
.menu-search{
  font-family:'Cormorant Garamond',serif;font-size:15px;
  color:var(--text);background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;
  padding:9px 18px;outline:none;transition:border-color .15s;
  width:100%;max-width:320px;
}
.menu-search:focus{border-color:var(--brand)}
.menu-search::placeholder{color:var(--muted)}
.menu-item{
  font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:1px;
  color:var(--brand);cursor:pointer;text-transform:uppercase;
  padding:4px 2px;transition:color .15s;white-space:nowrap;
}
.menu-item:hover{color:var(--brand2)}
.menu-drop{position:relative}
.menu-arrow{display:inline-block;font-size:13px;margin-left:3px;transition:transform .2s}
.menu-drop.open .menu-arrow{transform:rotate(180deg)}
.dropdown-list{
  display:none;position:absolute;top:calc(100% + 14px);left:50%;transform:translateX(-50%);
  background:#fff;border:1px solid var(--bg3);border-radius:6px;
  box-shadow:0 8px 24px rgba(74,45,31,.15);
  width:max-content;max-width:92vw;
  z-index:60;text-align:left;overflow:hidden;
}
.menu-drop.open .dropdown-list{display:flex}
.dropdown-cats{
  display:flex;flex-direction:column;min-width:170px;max-width:220px;
  padding:8px 0;border-right:1px solid var(--bg3);flex-shrink:0;
}
.dropdown-subs{
  display:flex;flex-direction:column;min-width:200px;max-width:250px;
  padding:8px 0;background:var(--bg2);max-height:340px;overflow-y:auto;flex-shrink:0;
}
.dropdown-item{
  font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text);
  padding:10px 20px;cursor:pointer;transition:background .15s;text-transform:none;
  display:flex;align-items:center;justify-content:space-between;gap:10px;white-space:nowrap;
}
.dropdown-item:hover{background:var(--bg2)}
.dropdown-item.on{color:var(--brand);font-weight:600}
.dropdown-item.active{background:var(--bg2);color:var(--brand)}
.dropdown-caret{color:var(--muted);font-size:11px}
.dropdown-item.active .dropdown-caret{color:var(--brand)}
@media(max-width:480px){
  .dropdown-cats{min-width:130px;max-width:150px}
  .dropdown-subs{min-width:160px;max-width:190px}
  .dropdown-item{font-size:13px;padding:9px 14px}
}
@media(max-width:480px){
  .menu-bar{gap:10px}
  .menu-item{font-size:14px}
  .menu-search{max-width:150px}
}

/* COLECCIÓN */
.catbar{
  background:var(--bg2);display:flex;gap:8px;flex-wrap:wrap;
  justify-content:center;padding:16px 20px;
  border-bottom:1px solid var(--bg3);
}
.coleccion{background:var(--bg2);padding:20px 20px 48px}
.coleccion-title{text-align:center;margin-bottom:32px}
.coleccion-title h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--brand);letter-spacing:2px}
.coleccion-title p{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:6px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  max-width:1000px;margin:0 auto;
  align-items:start;
}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);gap:14px}}
@media(max-width:420px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{background:#fff;border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .2s;border:1px solid #ede5da}
.card:hover{box-shadow:0 4px 20px rgba(74,45,31,.12)}
.card-img{aspect-ratio:3/4;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.card:hover .card-img img{transform:scale(1.04)}
.card-img .placeholder{font-size:32px;color:var(--muted);opacity:.4}
.card-body{padding:12px 12px 8px;background:#EDE5DA;border-top:none}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#2a1a10}
.card-desc{font-size:12px;color:#6b4f3a;margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4A2D1F;width:100%;margin-top:4px;margin-bottom:2px;font-weight:600}
.tag{font-size:11px;background:var(--bg);color:#2a1a10;border-radius:20px;padding:3px 10px;display:flex;align-items:center;gap:4px}
.tag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 12px;background:#EDE5DA}
.card-price{font-family:'Lato',sans-serif;font-size:19px;font-weight:700;color:#2a1a10;letter-spacing:.3px}
.card-price-old{font-family:'Lato',sans-serif;font-size:14px;color:var(--muted);text-decoration:line-through;margin-left:10px}
.price-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.price-off{font-size:10px;font-weight:700;letter-spacing:.5px;background:var(--brand);color:#fff;border-radius:10px;padding:2px 7px;font-family:'Lato',sans-serif}
.btn-ws{
  display:flex;align-items:center;gap:6px;
  background:var(--brand);color:#fff;border:none;
  border-radius:20px;padding:8px 14px;
  font-size:12px;cursor:pointer;font-family:'Cormorant Garamond',serif;
  transition:background .15s;white-space:nowrap;
}
.btn-ws:hover{background:var(--brand2)}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(42,26,16,.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border-radius:8px;width:min(380px,95%);max-height:90vh;overflow-y:auto;position:relative}
.modal-img{width:100%;aspect-ratio:4/3;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;border-radius:8px 8px 0 0}
.modal-img img{max-width:100%;max-height:310px;object-fit:contain;display:block}
.modal-body{padding:24px;background:var(--bg2)}
.modal-close{position:absolute;top:12px;right:12px;background:var(--bg2);border:1px solid var(--bg3);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg2)}
.modal-share{position:absolute;top:12px;right:52px;background:var(--bg2);border:1px solid var(--bg3);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--brand);display:flex;align-items:center;justify-content:center}
.modal-share:hover{background:var(--bg3)}
.modal-cat{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.modal-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--brand);line-height:1.2;margin-bottom:8px}
.modal-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.modal-attrs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.attr{background:var(--bg3);padding:10px 12px;border-radius:4px;border:1px solid var(--bg3)}
.attr-l{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.attr-v{font-size:13px;color:var(--text);font-weight:400}
.modal-price{margin-bottom:16px}
.modal-price-main{font-family:'Lato',sans-serif;font-size:26px;font-weight:700;color:var(--text)}
.modal-price-old{font-family:'Lato',sans-serif;font-size:17px;color:var(--muted);text-decoration:line-through;margin-left:8px}
.modal-ws{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;font-family:'Cormorant Garamond',serif;transition:background .15s}
.modal-ws:hover{background:var(--brand2)}

/* GALERÍA MODAL */
.modal-img-wrap{position:relative;width:100%;background:var(--bg3);border-radius:8px 8px 0 0;overflow:hidden}
.modal-img-wrap .modal-img{border-radius:0}
.gallery-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(74,45,31,.55);color:#fff;border:none;
  width:36px;height:36px;border-radius:50%;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:5;transition:background .15s;
}
.gallery-arrow:hover{background:rgba(74,45,31,.85)}
.gallery-arrow.prev{left:10px}
.gallery-arrow.next{right:10px}
.gallery-dots{
  display:flex;justify-content:center;gap:6px;
  padding:8px 0 4px;background:var(--bg3);
}
.gallery-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--bg3);border:1.5px solid var(--brand);
  cursor:pointer;transition:background .15s;flex-shrink:0;
}
.gallery-dot.active{background:var(--brand)}

.card-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(74,45,31,.5);color:#fff;border:none;
  width:26px;height:26px;border-radius:50%;
  font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:5;transition:background .15s;opacity:1;
}
.card-arrow:hover{background:rgba(74,45,31,.85)}
.card-arrow.prev{left:6px}
.card-arrow.next{right:6px}
.card-dots{
  position:absolute;bottom:6px;left:0;right:0;
  display:flex;justify-content:center;gap:4px;z-index:5;
}
.card-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.6);border:1px solid rgba(74,45,31,.5);
  flex-shrink:0;
}
.card-dot.active{background:var(--brand);border-color:var(--brand)}

.card-share{
  position:absolute;top:8px;right:8px;
  background:rgba(74,45,31,.55);color:#fff;border:none;
  width:26px;height:26px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:6;transition:background .15s;
}
.card-share:hover{background:rgba(74,45,31,.85)}

/* LOADING */
.loading{text-align:center;padding:4rem;color:var(--muted);font-size:13px;letter-spacing:2px;grid-column:1/-1}

/* FOOTER */
footer{background:var(--footer);color:#c9a87c;text-align:center;padding:36px 20px}
footer h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:2px;margin-bottom:6px}
footer p{font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:14px}
footer a{color:#c9a87c;text-decoration:none;font-size:12px;letter-spacing:1px;opacity:.8}
footer a:hover{opacity:1}


</style>
</head>
<body>

<!-- NAV -->
<div class="sticky-top">
<nav>

<script>
const WS = '5491178272009';
const firebaseConfig = {
  apiKey:"AIzaSyAjIm2QwhaSKR1y6-aYc0_nnxR94Oj1CAY",
  authDomain:"aura-catalogo.firebaseapp.com",
  projectId:"aura-catalogo",
  storageBucket:"aura-catalogo-fotos",
  messagingSenderId:"918492971619",
  appId:"1:918492971619:web:3c8a773d67cdcd5e59ae56"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos = [];
let productFotos = {};
let filtro = 'Todos';
let subFiltro = 'Todos';
let busqueda = '';
let busquedaOriginal = '';

// Colores para tags
const COLORES_MAP = {
  'negro':'#2a2a2a','negra':'#2a2a2a','negras':'#2a2a2a','negros':'#2a2a2a','blanco':'#f5f5f5','beige':'#c9a87c','crema':'#e8dcc8',
  'nude':'#d4a98a','gris':'#888','marengo':'#4a4a5a','bordo':'#6b1a2a',
  'rojo':'#c0392b','azul':'#2980b9','verde':'#27ae60','oliva':'#6b7c3a',
  'rosa':'#e8a0a0','lila':'#9b59b6','celeste':'#74b9e0','naranja':'#e67e22',
  'mostaza':'#c9a000','chocolate':'#3d1a0e','camel':'#c19a6b',
  'malbec':'#6b2d45','vino':'#6b2d45','bordo':'#7a1f35','granate':'#7a1f35',
  'terracota':'#b5541e','arena':'#d4c4a0','marfil':'#f0ead6','perla':'#ede8df',
};
function colorDot(c){
  const k=c.toLowerCase().trim();
  for(const[n,v] of Object.entries(COLORES_MAP)){if(k.includes(n))return v;}
  return '#c9a87c';
}

let banners=[];
let bannerIdx=0;
let bannerTimer=null;

async function cargarBanners(){
  try{
    const doc=await db.collection('config').doc('banners').get();
    if(!doc.exists)return;
    const d=doc.data();
    banners=[d.banner1,d.banner2,d.banner3].map(u=>(u||'').trim()).filter(Boolean);
    renderBanners();
  }catch(e){console.error('Error al cargar banners',e);}
}

function renderBanners(){
  document.getElementById('banner-track').innerHTML=banners.map(u=>`<div class="banner-slide"><img src="${u}" alt="Promoción AURA Style"/></div>`).join('');
  document.getElementById('banner-dots').innerHTML=banners.length>1
    ?banners.map((_,i)=>`<span class="banner-dot${i===0?' active':''}" onclick="bannerGo(${i})"></span>`).join('')
    :'';
  bannerIdx=0;
  updateBannerTrack();
  if(banners.length>1)startBannerAutoplay();
  setupBannerSwipe();
  updateTopSection();
}

function updateTopSection(){
  const header=document.getElementById('catalog-header');
  const wrap=document.getElementById('banner-wrap');
  const ctaBar=document.getElementById('banner-cta-bar');
  if(busqueda){
    wrap.style.display='none';
    ctaBar.style.display='none';
    header.style.display='block';
    document.getElementById('breadcrumb').innerHTML=`<span class="crumb-link" onclick="limpiarBusqueda()">Inicio</span> . Búsqueda`;
    document.getElementById('catalog-title').textContent=`Resultados para "${busquedaOriginal}"`;
  }else if(filtro==='Todos'){
    header.style.display='none';
    if(banners.length){wrap.style.display='block';ctaBar.style.display='flex';}
    else{wrap.style.display='none';ctaBar.style.display='none';}
  }else{
    wrap.style.display='none';
    ctaBar.style.display='none';
    header.style.display='block';
    const sub=subFiltro!=='Todos'?subFiltro:null;
    document.getElementById('breadcrumb').innerHTML=`<span class="crumb-link" onclick="setFiltro('Todos')">Inicio</span> . <span class="crumb-link" onclick="setFiltro('${esc(filtro)}')">${filtro}</span>${sub?` . <span class="crumb-current">${esc(sub)}</span>`:''}`;
    document.getElementById('catalog-title').textContent=sub||filtro;
  }
}

function limpiarBusqueda(){
  busqueda='';
  busquedaOriginal='';
  document.getElementById('search-input').value='';
  renderGrid();
  updateTopSection();
}

function updateBannerTrack(){
  document.getElementById('banner-track').style.transform=`translateX(-${bannerIdx*100}%)`;
  document.querySelectorAll('.banner-dot').forEach((d,i)=>d.classList.toggle('active',i===bannerIdx));
}

function bannerGo(i){
  bannerIdx=i;
  updateBannerTrack();
  restartBannerAutoplay();
}

function startBannerAutoplay(){
  clearInterval(bannerTimer);
  bannerTimer=setInterval(()=>{
    bannerIdx=(bannerIdx+1)%banners.length;
    updateBannerTrack();
  },4500);
}
function restartBannerAutoplay(){
  clearInterval(bannerTimer);
  if(banners.length>1)startBannerAutoplay();
}

function setupBannerSwipe(){
  const wrap=document.getElementById('banner-wrap');
  let startX=0;
  wrap.ontouchstart=e=>{startX=e.touches[0].clientX;};
  wrap.ontouchend=e=>{
    const diff=e.changedTouches[0].clientX-startX;
    if(Math.abs(diff)>40 && banners.length>1){
      bannerIdx=diff<0?(bannerIdx+1)%banners.length:(bannerIdx-1+banners.length)%banners.length;
      updateBannerTrack();
      restartBannerAutoplay();
    }
  };
}

async function cargarProductos(){
  try{
    const snap = await db.collection('productos').orderBy('fecha','desc').get();
    productos = snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.activo!==false);
    renderCats();
    renderGrid();
    const params=new URLSearchParams(location.search);
    const pid=params.get('producto');
    if(pid && productos.some(p=>p.id===pid)) openModal(pid);
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="loading">Error al cargar. Verificá la conexión.</div>';
  }
}

function esc(s){return String(s).replace(/'/g,"\\'");}

let catsData=[];
let menuCatActiva=null;

function renderCats(){
  const cats=['Todos',...new Set(productos.map(p=>p.categoria||'Otros').filter(Boolean))];
  catsData=cats.map(c=>({
    name:c,
    subs:c==='Todos'?[]:[...new Set(productos.filter(p=>(p.categoria||'Otros')===c && p.subrubro).map(p=>p.subrubro.trim()))]
  }));
  if(menuCatActiva && !catsData.find(c=>c.name===menuCatActiva && c.subs.length)){
    menuCatActiva=null;
  }
  document.getElementById('dropdown-cats').innerHTML=catsData.map(o=>{
    const tieneSubs=o.subs.length>0;
    const activo=tieneSubs && o.name===menuCatActiva;
    const seleccionado=(!tieneSubs && o.name===filtro);
    const onclick=tieneSubs?`selectMenuCat('${esc(o.name)}')`:`setFiltro('${esc(o.name)}');closeDropdown()`;
    return `<div class="dropdown-item${activo?' active':''}${seleccionado?' on':''}" onclick="${onclick}">
      <span>${o.name}</span>${tieneSubs?'<span class="dropdown-caret">&#10095;</span>':''}
    </div>`;
  }).join('');
  renderSubsPanel();
  document.getElementById('menu-productos-label').textContent=(filtro==='Todos')?'Productos':(subFiltro!=='Todos'?subFiltro:filtro);
}

function renderSubsPanel(){
  const cont=document.getElementById('dropdown-subs');
  const cat=catsData.find(c=>c.name===menuCatActiva);
  if(!cat){cont.innerHTML='';cont.style.display='none';return;}
  cont.style.display='flex';
  let html=`<div class="dropdown-item${(filtro===cat.name&&subFiltro==='Todos')?' on':''}" onclick="setFiltro('${esc(cat.name)}');setSubFiltro('Todos');closeDropdown()"><span>Ver todo</span></div>`;
  html+=cat.subs.map(s=>`<div class="dropdown-item${(filtro===cat.name&&s===subFiltro)?' on':''}" onclick="setFiltro('${esc(cat.name)}');setSubFiltro('${esc(s)}');closeDropdown()"><span>${s}</span></div>`).join('');
  cont.innerHTML=html;
}

function selectMenuCat(name){
  menuCatActiva=name;
  renderCatsHighlight();
  renderSubsPanel();
}

function renderCatsHighlight(){
  document.querySelectorAll('#dropdown-cats .dropdown-item').forEach(el=>{
    const nombre=el.querySelector('span')?.textContent;
    const cat=catsData.find(c=>c.name===nombre);
    el.classList.toggle('active', !!(cat && cat.subs.length && cat.name===menuCatActiva));
  });
}

function toggleDropdown(){
  document.getElementById('menu-productos').classList.toggle('open');
}
function closeDropdown(){
  document.getElementById('menu-productos').classList.remove('open');
  menuCatActiva=null;
  renderSubsPanel();
  renderCatsHighlight();
}
document.addEventListener('click',function(e){
  const menu=document.getElementById('menu-productos');
  if(menu && !menu.contains(e.target) && menu.classList.contains('open')) closeDropdown();
});

function irInicio(){
  setFiltro('Todos');
  window.scrollTo({top:0,behavior:'smooth'});
}
function irContacto(){
  const msg=encodeURIComponent(`Hola AURA Style! ✨\nQuería hacerte una consulta.`);
  window.open(`https://wa.me/${WS}?text=${msg}`,'_blank');
}

function setFiltro(c){
  filtro=c;subFiltro='Todos';
  busqueda='';busquedaOriginal='';
  const si=document.getElementById('search-input');if(si)si.value='';
  renderCats();renderGrid();updateTopSection();
}
function setSubFiltro(s){
  subFiltro=s;
  busqueda='';busquedaOriginal='';
  const si=document.getElementById('search-input');if(si)si.value='';
  renderCats();renderGrid();updateTopSection();
}
function setBusqueda(v){
  busqueda=v.trim().toLowerCase();
  busquedaOriginal=v.trim();
  if(busqueda){filtro='Todos';subFiltro='Todos';}
  renderCats();
  renderGrid();
  updateTopSection();
}

function renderGrid(){
  let show;
  if(busqueda){
    show=productos.filter(p=>{
      const texto=(p.nombre||'').toLowerCase();
      return texto.includes(busqueda);
    });
  }else{
    show=(filtro==='Todos'?productos:productos.filter(p=>(p.categoria||'Otros')===filtro));
    if(filtro!=='Todos' && subFiltro!=='Todos'){
      show=show.filter(p=>(p.subrubro||'').trim()===subFiltro);
    }
  }
  show=show.sort((a,b)=>(a.orden||99)-(b.orden||99));
  if(!show.length){
    let msg='No hay productos en esta categoría.';
    if(busqueda) msg='No hay productos que coincidan con tu búsqueda.';
    else if(!productos.length) msg='No se pudieron cargar los productos. Revisá tu conexión y volvé a intentar.';
    document.getElementById('grid').innerHTML=`<div class="loading">${msg}</div>`;
    return;
  }
  document.getElementById('grid').innerHTML=show.map(p=>{
    const colores=(p.color||'').split(',').map(c=>c.trim()).filter(Boolean);
    const talles=(p.talle||'').split(',').map(t=>t.trim()).filter(Boolean);
    let fotos=[];
    if(p.fotoUrls){
      if(Array.isArray(p.fotoUrls)) fotos=p.fotoUrls;
      else if(typeof p.fotoUrls==='string') fotos=p.fotoUrls.split('\n').map(u=>u.trim()).filter(Boolean);
    }
    if(!fotos.length && p.fotoUrl) fotos=[p.fotoUrl];
    productFotos[p.id]=fotos;
    const img=fotos.length?`<img src="${fotos[0]}" alt="${p.nombre}" loading="lazy" data-idx="0"/>`:`<span class="placeholder">✦</span>`;
    const tieneVarias=fotos.length>1;
    const flechas=tieneVarias?`
      <button class="card-arrow prev" onclick="event.stopPropagation();cardNav('${p.id}',-1)">&#8249;</button>
      <button class="card-arrow next" onclick="event.stopPropagation();cardNav('${p.id}',1)">&#8250;</button>
      <div class="card-dots">${fotos.map((_,i)=>`<span class="card-dot${i===0?' active':''}"></span>`).join('')}</div>`:'';
    return `<div class="card" onclick="openModal('${p.id}')">
      <div class="card-img" id="cardimg-${p.id}">${img}${flechas}<button class="card-share" onclick="event.stopPropagation();shareProduct('${p.id}')" title="Compartir">${shareico()}</button></div>
      <div class="card-body">
        <div class="card-name">${p.nombre||''}</div>
        <div class="card-desc">${p.descripcion||''}</div>
        <div class="card-tags">
          <div class="tag-label">Colores</div>
          ${colores.map(c=>`<span class="tag"><span class="tag-dot" style="background:${colorDot(c)}"></span>${c}</span>`).join('')}
          <div class="tag-label">Talles</div>
          ${talles.map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
      <div class="card-footer">
        ${precioHTML(p,'card-price-old','card-price')}
        <button class="btn-ws" onclick="event.stopPropagation();sendWS('${p.id}')">${wsico()} Consultar</button>
      </div>
    </div>`;
  }).join('');
}

function cardNav(id,dir){
  const wrap=document.getElementById('cardimg-'+id);
  if(!wrap)return;
  const fotos=productFotos[id]||[];
  if(!fotos.length)return;
  const img=wrap.querySelector('img');
  let idx=parseInt(img.getAttribute('data-idx')||'0');
  idx=(idx+dir+fotos.length)%fotos.length;
  img.src=fotos[idx];
  img.setAttribute('data-idx',idx);
  wrap.querySelectorAll('.card-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

let galFotos=[];
let galIdx=0;

function openModal(id){
  const p=productos.find(x=>x.id===id);
  if(!p)return;
  const colores=(p.color||'').split(',').map(c=>c.trim()).filter(Boolean);
  const talles=(p.talle||'').split(',').map(t=>t.trim()).filter(Boolean);
  galFotos=[];
  if(p.fotoUrls){
    if(Array.isArray(p.fotoUrls)) galFotos=p.fotoUrls;
    else if(typeof p.fotoUrls==='string') galFotos=p.fotoUrls.split('\n').map(u=>u.trim()).filter(Boolean);
  }
  if(!galFotos.length && p.fotoUrl) galFotos=[p.fotoUrl];
  galIdx=0;

  const tieneGaleria=galFotos.length>1;
  const imgPrincipal=galFotos.length
    ?`<img id="modal-main-img" src="${galFotos[0]}" alt="${p.nombre}" style="width:100%;max-height:310px;object-fit:contain;display:block"/>`
    :`<div style="font-size:64px;color:var(--muted);opacity:.3;padding:60px 0">✦</div>`;

  const flechas=tieneGaleria?`
    <button class="gallery-arrow prev" onclick="galNav(-1)">&#8249;</button>
    <button class="gallery-arrow next" onclick="galNav(1)">&#8250;</button>`:'';

  const dots=tieneGaleria?`<div class="gallery-dots" id="gallery-dots">
    ${galFotos.map((_,i)=>`<span class="gallery-dot${i===0?' active':''}" onclick="galGo(${i})"></span>`).join('')}
  </div>`:'';

  document.getElementById('modal').innerHTML=`
    <div class="modal-img-wrap">
      <div class="modal-img">${imgPrincipal}</div>
      ${flechas}
    </div>
    ${dots}
    <div class="modal-body">
      <button class="modal-close" onclick="closeModal()">×</button>
      <button class="modal-share" onclick="shareProduct('${p.id}')" title="Compartir">${shareico()}</button>
      <div class="modal-cat">${p.categoria||''} · ${p.modelo||''}</div>
      <div class="modal-name">${p.nombre||''}</div>
      <p class="modal-desc">${p.descripcion||''}</p>
      <div class="modal-attrs">
        <div class="attr"><div class="attr-l">Talles</div><div class="attr-v">${talles.join(', ')||'—'}</div></div>
        <div class="attr"><div class="attr-l">Colores</div><div class="attr-v">${colores.join(', ')||'—'}</div></div>
      </div>
      <div class="modal-price">${precioHTML(p,'modal-price-old','modal-price-main')}</div>
      <button class="modal-ws" onclick="sendWS('${p.id}')">${wsico()} Consultar por WhatsApp</button>
    </div>`;
  document.getElementById('modal-ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function galNav(dir){
  galIdx=(galIdx+dir+galFotos.length)%galFotos.length;
  galGo(galIdx);
}
function galGo(i){
  galIdx=i;
  document.getElementById('modal-main-img').src=galFotos[i];
  document.querySelectorAll('.gallery-dot').forEach((d,idx)=>d.classList.toggle('active',idx===i));
}
function closeModal(){document.getElementById('modal-ov').classList.remove('open');document.body.style.overflow='';}

function sendBannerWS(){
  const msg=encodeURIComponent(`Hola AURA Style! ✨\nVi la promo del catálogo y quiero más info.`);
  window.open(`https://wa.me/${WS}?text=${msg}`,'_blank');
}

function sendWS(id){
  const p=productos.find(x=>x.id===id);
  const precio=p.precio?'$'+Number(p.precio).toLocaleString('es-AR'):'';
  const msg=encodeURIComponent(`Hola AURA Style! ✨
Me interesa:
*${p.nombre}* (${p.modelo||''})
${precio}
¿Me podés dar más info?`);
  window.open(`https://wa.me/${WS}?text=${msg}`,'_blank');
}

function fmtPrecio(p){return '$'+Number(p).toLocaleString('es-AR');}
function precioHTML(p,claseChica,claseGrande){
  const a=parseFloat(p.precio)||0;
  const b=parseFloat(p.precio2)||0;
  if(!a && !b)return '';
  if(!b || a===b)return `<span class="${claseGrande}">${fmtPrecio(a)}</span>`;
  const menor=Math.min(a,b), mayor=Math.max(a,b);
  const off=Math.round((1-menor/mayor)*100);
  return `<div class="price-row"><span class="${claseGrande}">${fmtPrecio(menor)}</span><span class="${claseChica}">${fmtPrecio(mayor)}</span><span class="price-off">-${off}%</span></div>`;
}
function shareico(){return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="10.6" x2="15.4" y2="6.4"/><line x1="8.6" y1="13.4" x2="15.4" y2="17.6"/></svg>`;}

function shareProduct(id){
  const p=productos.find(x=>x.id===id);
  if(!p)return;
  const link=`${location.origin}${location.pathname}?producto=${id}`;
  const texto=`¡Mirá este producto de AURA Style! ✨\n*${p.nombre}*\n${link}`;
  if(navigator.share){
    navigator.share({title:p.nombre,text:texto,url:link}).catch(()=>{});
  }else{
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`,'_blank');
  }
}

cargarProductos();
cargarBanners();
</script>
</body>
</html>
